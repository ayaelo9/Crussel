<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel | Comidas del Mundo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-950 min-h-screen pb-20">

    <main class="max-w-6xl mx-auto px-6">

        <section class="flex justify-center mt-10 px-0 sm:px-4">

            <div class="bg-black text-white w-full max-w-[1150px] p-4 md:p-8 pt-16 md:pt-8 relative rounded-2xl overflow-hidden">

                <div class="absolute top-4 left-4 md:top-6 md:left-6 z-20">
                    <button 
                        id="autoPlay"
                        class="bg-white text-black px-3 py-1.5 md:px-5 md:py-2 rounded-xl text-sm md:text-lg font-bold hover:bg-gray-600 transition shadow-lg"
                    >
                        ▶ Auto
                    </button>
                </div>
                
                <button 
                    onclick="cambiarSlide(-1)"
                    class="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 text-2xl md:text-6xl font-bold z-10 select-none"
                >
                    «
                </button>
                <button 
                    onclick="cambiarSlide(1)"
                    class="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 text-2xl md:text-6xl font-bold z-10 select-none"
                >
                    »
                </button>

                <h1 class="text-2xl md:text-5xl font-bold text-center mb-6 pl-16 pr-4 md:px-0">
                    Comidas del Mundo
                </h1>

                <div class="flex justify-center px-2 md:px-0">
                    <div class="w-full max-w-[950px] h-[250px] sm:h-[350px] md:h-[450px] overflow-hidden rounded-xl">
                        <img 
                            id="foto-comida"
                            src=""
                            class="w-full h-full object-cover"
                        >
                    </div>
                </div>

                <div class="w-full max-w-[950px] mx-auto mt-6 px-4 md:px-0">

                    <h2 id="nombre-plato" class="text-2xl md:text-4xl font-bold">
                    </h2>

                    <p id="desc-plato" class="text-lg md:text-2xl text-gray-600 mt-2">
                    </p>

                    <ul id="lista-caract" class="text-lg md:text-2xl mt-4 space-y-2">
                    </ul>

                </div>

            </div>

        </section>

    </main>

    <script src="app.js"></script>

</body>

</html>
